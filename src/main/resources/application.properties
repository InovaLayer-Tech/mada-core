# ===================================================================
# IDENTIFICAÇÃO DA APLICAÇÃO
# ===================================================================
spring.application.name=mada-core
server.port=8080

# ===================================================================
# CONFIGURAÇÕES DE BASE DE DADOS (POSTGRESQL) - COM PROTEÇÃO DE INJEÇÃO
# ===================================================================
# O Spring tentará ler DB_URL do seu .env ou do Docker. 
# Se não encontrar, usará o seu jdbc:postgresql://localhost:5432/mada_db
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mada_db}

# O mesmo padrão de segurança para o usuário e senha que você definiu.
spring.datasource.username=${DB_USER:mada_admin}
spring.datasource.password=${DB_PASSWORD:mada_password_123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURAÇÕES DO HIBERNATE (JPA)
# ===================================================================
# update: Garante que as tabelas sejam criadas ou atualizadas automaticamente
spring.jpa.hibernate.ddl-auto=update

# Opcional (apenas para desenvolvimento): Imprime o SQL formatado no terminal 
# para que você possa ver o Hibernate criando as tabelas do LAPROSOLDA.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false