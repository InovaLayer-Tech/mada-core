# ====================================================================
# InovaLayer3D - Message Dictionary (EN-US)
# ====================================================================

# Input Validations (Metrology - Phase 2 DC)
Validacao.MassaEstimada.NotNull=The estimated mass of the consumable is a mandatory parameter.
Validacao.MassaEstimada.Positive=The estimated mass must be a strictly positive value greater than zero.
Validacao.TempoArco.NotNull=The total arc time is mandatory for determining the Machine Cost (Cmq).
Validacao.TempoArco.Positive=The arc time must be greater than zero minutes.

# PHASE 1 (IC) and Consumables
Validacao.Arame.NotNull=The consumable identifier (Wire) is required.
Validacao.TempoPreparacao.NotNull=The setup time is required.
Validacao.TempoPreparacao.Positive=The setup time must be greater than zero.
Validacao.TempoRemocao.NotNull=The teardown time is required.
Validacao.TempoRemocao.Positive=The teardown time must be greater than zero.

# PHASE 3 (AC)
Validacao.ProjetoCAD.NotNull=The CAD design intent is required.
Validacao.UsinagemFinal.NotNull=The final machining intent is required.

Validacao.Densidade.NotNull=The material density is mandatory for volumetric conversion.

# Global and Domain Errors (RestControllerAdvice)
Erro.RecursoNaoEncontrado=The requested resource was not found in the database.
Erro.ValidacaoPayload=The provided parameters do not meet the required mathematical constraints.
Erro.ProcessamentoMetrologico=Inconsistency identified during the execution of the metrological equation.
Erro.Servidor=An internal error occurred in the calculation engine.