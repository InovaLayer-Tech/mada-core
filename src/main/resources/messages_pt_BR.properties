# Validações de Entrada (Metrologia - Fase 2 DC)
Validacao.MassaEstimada.NotNull=A massa estimada do consumível é um parâmetro obrigatório.
Validacao.MassaEstimada.Positive=A massa estimada deve ser um valor estritamente positivo e superior a zero.
Validacao.TempoArco.NotNull=O tempo total de arco é obrigatório para a determinação do Custo de Máquina (Cmq).
Validacao.TempoArco.Positive=O tempo de arco deve ser superior a zero minutos.

# FASE 1 (IC) e Insumo
Validacao.Arame.NotNull=O identificador do insumo (Arame) é obrigatório.
Validacao.TempoPreparacao.NotNull=O tempo de preparação é obrigatório.
Validacao.TempoPreparacao.Positive=O tempo de preparação deve ser maior que zero.
Validacao.TempoRemocao.NotNull=O tempo de remoção é obrigatório.
Validacao.TempoRemocao.Positive=O tempo de remoção deve ser maior que zero.

# FASE 3 (AC)
Validacao.ProjetoCAD.NotNull=A intenção de Projeto CAD é obrigatória.
Validacao.UsinagemFinal.NotNull=A intenção de Usinagem Final é obrigatória.

Validacao.Densidade.NotNull=A densidade do material é obrigatória para a conversão volumétrica.

# Erros Globais e de Domínio (RestControllerAdvice)
Erro.RecursoNaoEncontrado=O recurso solicitado não foi localizado na base de dados.
Erro.ValidacaoPayload=Os parâmetros fornecidos não cumprem as restrições matemáticas exigidas.
Erro.ProcessamentoMetrologico=Inconsistência identificada durante a execução da equação metrológica.
Erro.Servidor=Ocorreu um erro interno no motor de cálculo.